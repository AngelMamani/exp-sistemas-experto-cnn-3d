<div class="AyudaModal" id="ayudaModal" hidden>
    <div class="AyudaModal__Contenido">
        <h3>Atajos de teclado</h3>
        <ul>
            <li><kbd>→</kbd> <kbd>↓</kbd> <kbd>Espacio</kbd> — Siguiente diapositiva</li>
            <li><kbd>←</kbd> <kbd>↑</kbd> — Diapositiva anterior</li>
            <li><kbd>Home</kbd> — Primera diapositiva</li>
            <li><kbd>End</kbd> — Última diapositiva</li>
            <li><kbd>F</kbd> — Pantalla completa</li>
            <li><kbd>?</kbd> — Abrir / cerrar esta ayuda</li>
            <li><kbd>Esc</kbd> — Cerrar ayuda</li>
        </ul>
        <button type="button" class="Boton Boton--Primario" id="btnCerrarAyuda">Entendido</button>
    </div>
</div>
